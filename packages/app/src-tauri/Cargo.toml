[package]
name = "app"
version = "0.1.0"
description = "desk.md - Project-centric work management for freelancers"
authors = ["Sascha Villing"]
license = "GPL-3.0-or-later"
repository = "https://github.com/v1lling/desk.md"
edition = "2021"
rust-version = "1.77.2"
default-run = "app"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5", features = [] }
cc = "1"

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10", features = [] }
tauri-plugin-log = "2"
tauri-plugin-fs = { version = "2", features = ["watch"] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
# Rust-side HTTP (reqwest) for the native hosted-mode client (step 3b-native): native
# RPC/auth calls run here, not as webview fetches, so they bypass the webview CSP
# connect-src and browser CORS. The reachable origins are scoped in capabilities/default.json.
tauri-plugin-http = "2"

chrono = { version = "0.4", features = ["serde"] }
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service", "crypto-rust"] }
